<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtGym — Профиль</title>
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <h2 class="logo">ExtGym</h2>
        <nav>
            <a href="dashboard.html">Главная</a>
            <a href="workout.html">Тренировки</a>
            <a href="progress.html">Прогресс</a>
            <a href="plan.html">План</a>
            <a href="profile.html" class="active">Профиль</a>
        </nav>
    </aside>

    <main class="main">

        <div class="header">
            <h1>Профиль</h1>
        </div>

        <!-- Инфо аккаунта -->
        <div class="block">
            <h2 class="block__title">Аккаунт</h2>
            <div class="profile-info">
                <div class="profile-info__avatar" id="avatarLetter"></div>
                <div class="profile-info__details">
                    <span class="profile-info__name" id="profileName"></span>
                    <span class="profile-info__email" id="profileEmail"></span>
                </div>
            </div>
        </div>

        <!-- Физические данные -->
        <div class="block">
            <h2 class="block__title">Физические данные</h2>
            <div class="form">
                <div class="field">
                    <label>Вес (кг)</label>
                    <input type="number" id="weight" placeholder="75"/>
                </div>
                <div class="field">
                    <label>Возраст</label>
                    <input type="number" id="age" placeholder="25"/>
                </div>
                <div class="field">
                    <label>Цель</label>
                    <select id="goal">
                        <option value="strength">Сила</option>
                        <option value="muscle">Набор массы</option>
                        <option value="loss">Похудение</option>
                        <option value="endurance">Выносливость</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" onclick="saveProfile()">Сохранить</button>
            <p class="save-msg" id="saveMsg"></p>
        </div>

        <!-- Статистика -->
        <div class="block">
            <h2 class="block__title">Статистика</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-item__value" id="statWorkouts">0</span>
                    <span class="stat-item__label">Тренировок</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item__value" id="statVolume">0</span>
                    <span class="stat-item__label">Общий объём (кг)</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item__value" id="statDays">0</span>
                    <span class="stat-item__label">Дней в приложении</span>
                </div>
            </div>
        </div>

        <!-- Опасная зона -->
        <div class="block block--danger">
            <h2 class="block__title">Аккаунт</h2>
            <button class="btn-logout" onclick="logout()">Выйти из аккаунта</button>
        </div>

    </main>
</div>
