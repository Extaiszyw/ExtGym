<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtGym — Регистрация</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-page">

        <div class="auth-box">
            <a href="index.html" class="auth-logo">ExtGym</a>
            <h1>Создать аккаунт</h1>
            <p class="auth-sub">Уже есть аккаунт? <a href="login.html">Войти</a></p>

            <div class="field">
                <label>Имя</label>
                <input type="text" id="name" placeholder="Иван" />
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="ivan@mail.ru" />
            </div>

            <div class="field">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" />
            </div>

            <div class="field">
                <label>Повтори пароль</label>
                <input type="password" id="password2" placeholder="Повтори пароль" />
            </div>

            <p class="error" id="error"></p>

            <button class="btn-auth" onclick="register()">Зарегистрироваться</button>
        </div>

    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
