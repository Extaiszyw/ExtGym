<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtGym — Вход</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-page">

        <div class="auth-box">
            <a href="index.html" class="auth-logo">ExtGym</a>
            <h1>Добро пожаловать</h1>
            <p class="auth-sub">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>

            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="ivan@mail.ru" />
            </div>

            <div class="field">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Твой пароль" />
            </div>

            <p class="error" id="error"></p>

            <button class="btn-auth" onclick="login()">Войти</button>
        </div>

    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
