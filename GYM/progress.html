<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtGym — Прогресс</title>
    <link rel="stylesheet" href="css/progress.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <h2 class="logo">ExtGym</h2>
        <nav>
            <a href="dashboard.html">Главная</a>
            <a href="workout.html">Тренировки</a>
            <a href="progress.html" class="active">Прогресс</a>
            <a href="plan.html">План</a>
        </nav>
    </aside>

    <main class="main">

        <div class="header">
            <h1>Прогресс</h1>
        </div>

        <!-- Статистика -->
        <div class="cards">
            <div class="card">
                <span class="card__label">Всего тренировок</span>
                <span class="card__value" id="totalWorkouts">0</span>
            </div>
            <div class="card">
                <span class="card__label">Общий объём</span>
                <span class="card__value" id="totalVolume">0 кг</span>
            </div>
            <div class="card">
                <span class="card__label">Лучшая неделя</span>
                <span class="card__value" id="bestWeek">0 тр.</span>
            </div>
            <div class="card">
                <span class="card__label">Streak</span>
                <span class="card__value" id="streak">0 🔥</span>
            </div>
        </div>

        <!-- График объёма по неделям -->
        <div class="block">
            <h2 class="block__title">Объём нагрузки по неделям</h2>
            <div class="volume-chart" id="volumeChart"></div>
        </div>

        <!-- График прогрессии по упражнению -->
        <div class="block">
            <div class="block__header">
                <h2 class="block__title">Прогрессия по упражнению</h2>
                <select id="exerciseSelect" onchange="renderWeightChart()">
                    <option value="">Выбери упражнение</option>
                </select>
            </div>
            <div id="weightChart">
                <p class="empty">Выбери упражнение чтобы увидеть прогресс</p>
            </div>
        </div>

        <!-- История -->
        <div class="block">
            <h2 class="block__title">История тренировок</h2>
            <div id="historyList"></div>
        </div>

    </main>
</div>

<script src="js/progress.js"></script>
</body>
</html>
